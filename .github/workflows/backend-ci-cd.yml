name: Backend CI/CD

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci-cd.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci-cd.yml"

concurrency:
  group: backend-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Backend Build and Validate
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20]

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build backend
        run: npm run build

  cd:
    name: Backend Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger backend deployment webhook
        if: secrets.BACKEND_DEPLOY_WEBHOOK_URL != ''
        run: |
          curl -fsSL -X POST "$BACKEND_DEPLOY_WEBHOOK_URL"
        env:
          BACKEND_DEPLOY_WEBHOOK_URL: ${{ secrets.BACKEND_DEPLOY_WEBHOOK_URL }}

      - name: Skip backend deploy when webhook is not configured
        if: secrets.BACKEND_DEPLOY_WEBHOOK_URL == ''
        run: echo "No backend deploy webhook configured. Set BACKEND_DEPLOY_WEBHOOK_URL to enable CD."